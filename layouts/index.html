<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Site.Title }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #1a1a1a;
      color: #e8e8e8;
      line-height: 1.8;
    }

    .banner {
      width: 100%;
      height: 100vh;
      background: url('/posts/media/photos/10988539_1016354405045348_2272559641369217874_n_1016354405045348.jpg') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
    }

    .banner h1 {
      font-size: 3rem;
      color: white;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
      background: rgba(0,0,0,0.4);
      padding: 20px 40px;
      border-radius: 4px;
    }

    .banner p {
      color: #ddd;
      font-size: 1.1rem;
      margin-top: 16px;
      background: rgba(0,0,0,0.4);
      padding: 10px 24px;
      border-radius: 4px;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .post {
      padding: 60px 0;
      border-bottom: 1px solid #333;
    }

    .post:last-child {
      border-bottom: none;
    }

    .post h2 {
      font-size: 1.6rem;
      color: #c9a84c;
      margin-bottom: 6px;
    }

    .post-meta {
      font-size: 0.85rem;
      color: #888;
      font-style: italic;
      margin-bottom: 24px;
    }

    .post-content p {
      margin-bottom: 1.2em;
    }

    .post-content img {
      width: 100%;
      height: auto;
      border-radius: 4px;
      margin: 16px 0;
    }

    .post-content em {
      color: #aaa;
      font-size: 0.9rem;
    }

    .post-content a {
      color: #c9a84c;
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #555;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <div class="banner">
    <h1>{{ .Site.Title }}</h1>
    <p>{{ .Site.Params.description }}</p>
  </div>

  <div class="container">
    {{ range (where .Site.RegularPages "Section" "posts").ByDate }}
    <div class="post">
      <h2>{{ .Title }}</h2>
      <div class="post-meta">{{ .Date.Format "January 2, 2006" }}</div>
      <div class="post-content">{{ .Content }}</div>
    </div>
    {{ end }}
  </div>

  <footer>Puerto Montt → Ushuaia, December 2014 – February 2015</footer>

</body>
</html>
